name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build debug APK
        run: gradle assembleDebug
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/TICKR.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TICKR-apk
          path: app/build/outputs/apk/debug/TICKR.apk

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/TICKR.apk
          body: |
            ## TICKR ${{ github.ref_name }}

            Secure ephemeral messaging. Anonymous IDs. Burn timers. No logs. No trace.

            ### Install
            1. Download **TICKR.apk** below
            2. On Android: **Settings → Security → Install unknown apps** → allow your browser
            3. Open the APK to install
            4. Requires Android 8.0+
