name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TICKR-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release APK on tag
        if: startsWith(github.ref, 'refs/tags/')
        run: ./gradlew assembleRelease || ./gradlew assembleDebug

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          fail_on_unmatched_files: false
          body: |
            ## TICKR ${{ github.ref_name }}

            Secure ephemeral messaging. No logs. No trace.

            **Install:**
            1. Download `app-debug.apk`
            2. On your Android device: Settings → Security → Allow unknown sources
            3. Open the downloaded APK to install

            Requires Android 8.0+
